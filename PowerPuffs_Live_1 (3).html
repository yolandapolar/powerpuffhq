<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF4F9D">
<title>Power Puffs HQ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700&display=swap');
:root{--hot:#FF4F9D;--deep:#B0185C;--blush:#FFD9E8;--mist:#FFF2F7;--paper:#FFF8FB;--ink:#3A1228;--soft:#8A5A72;--line:#F4C4DC;--mint:#FFE4F0;--ok:#2FA37A;--warn:#E06A8A;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'Manrope',system-ui,sans-serif;color:var(--ink);background:radial-gradient(120% 80% at 50% -10%,#FFE9F3 0%,var(--paper) 55%) fixed;padding-bottom:88px;line-height:1.45;overscroll-behavior-y:contain;}
.wrap{max-width:560px;margin:0 auto;padding:0 16px;}
header{position:sticky;top:0;z-index:30;backdrop-filter:saturate(1.4) blur(10px);background:linear-gradient(180deg,rgba(255,242,247,.96),rgba(255,242,247,.78));border-bottom:1px solid var(--line);}
.head-in{max-width:560px;margin:0 auto;padding:14px 16px 12px;display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.brand{font-family:'Fraunces',serif;font-weight:600;font-size:25px;letter-spacing:-.5px;color:var(--deep);line-height:1;}
.brand .puff{font-style:italic;}
.tagline{font-size:11px;color:var(--soft);font-weight:600;text-transform:uppercase;letter-spacing:1.5px;}
.sec-title{font-family:'Fraunces',serif;font-size:22px;color:var(--deep);margin:20px 2px 4px;font-weight:600;}
.sec-sub{font-size:13px;color:var(--soft);margin:0 2px 14px;}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px 14px;min-width:96px;box-shadow:0 2px 8px rgba(176,24,92,.05);}
.chip .k{font-size:11px;color:var(--soft);font-weight:600;letter-spacing:.3px;}
.chip .v{font-family:'Fraunces',serif;font-size:20px;color:var(--deep);font-weight:600;margin-top:2px;}
.chip .v.neg{color:var(--warn);}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 15px;margin:11px 0;box-shadow:0 4px 16px rgba(176,24,92,.06);position:relative;}
.card h3{margin:0 0 6px;font-size:15.5px;font-weight:700;color:var(--ink);line-height:1.3;}
.row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px;}
.meta{font-size:12.5px;color:var(--soft);}
.note{font-size:13px;color:var(--ink);opacity:.85;margin-top:8px;white-space:pre-wrap;}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;letter-spacing:.2px;}
.pill.cost{background:var(--mint);color:var(--deep);}
.pill.office{background:#E7F6F0;color:var(--ok);}
.pill.out{background:#FBEAF0;color:var(--warn);}
.pill.idea{background:#F1E9FB;color:#7A4FB0;}
.pill.given{background:#FFF0D9;color:#B07A1F;}
.pill.status{background:var(--blush);color:var(--deep);}
.who{display:inline-flex;align-items:center;gap:3px;background:var(--mist);border:1px solid var(--line);border-radius:999px;padding:3px 9px;font-size:11.5px;font-weight:600;color:var(--deep);}
.offer-text{display:none;margin-top:10px;padding:11px 12px;background:var(--mist);border-radius:12px;border:1px solid var(--line);font-size:12.5px;white-space:pre-wrap;color:var(--ink);}
.offer-text.open{display:block;}
.expand{margin-top:9px;font-size:12.5px;font-weight:700;color:var(--hot);background:none;border:none;padding:0;cursor:pointer;}
.cal-item{display:flex;gap:13px;align-items:flex-start;}
.cal-date{flex:0 0 54px;text-align:center;background:linear-gradient(160deg,var(--blush),var(--mint));border-radius:13px;padding:8px 4px;border:1px solid var(--line);}
.cal-date .d{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--deep);line-height:1;}
.cal-date .m{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--soft);font-weight:700;margin-top:3px;}
.cal-body{flex:1;}
.cal-body .t{font-weight:700;font-size:14.5px;}
.gal{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:6px;}
.gal img{width:100%;height:150px;object-fit:cover;border-radius:14px;border:1px solid var(--line);cursor:pointer;display:block;}
.gal-wide{grid-column:1/-1;}
.gal-wide img{height:200px;}
nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(255,248,251,.92);backdrop-filter:blur(14px) saturate(1.3);border-top:1px solid var(--line);}
.nav-in{max-width:560px;margin:0 auto;display:flex;justify-content:space-around;padding:7px 4px calc(7px + env(safe-area-inset-bottom));}
.tab{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;cursor:pointer;color:var(--soft);}
.tab .ico{font-size:21px;line-height:1;filter:grayscale(.5) opacity(.7);transition:.2s;}
.tab .lbl{font-size:10px;font-weight:700;}
.tab.on{color:var(--deep);}
.tab.on .ico{filter:none;transform:translateY(-1px) scale(1.12);}
.view{display:none;animation:fade .28s ease;}
.view.on{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.lb{position:fixed;inset:0;z-index:80;background:rgba(58,18,40,.92);display:none;align-items:center;justify-content:center;padding:20px;}
.lb.on{display:flex;}
.lb img{max-width:100%;max-height:90vh;border-radius:14px;}
.empty{text-align:center;color:var(--soft);padding:30px 10px;font-size:14px;}
.loader{text-align:center;padding:40px 10px;color:var(--soft);}
.spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--hot);border-radius:50%;margin:0 auto 12px;animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.refresh{position:fixed;right:calc(50% - 280px + 18px);bottom:104px;z-index:35;width:52px;height:52px;border-radius:50%;border:none;background:linear-gradient(145deg,var(--hot),var(--deep));color:#fff;font-size:22px;box-shadow:0 8px 22px rgba(176,24,92,.4);cursor:pointer;}
@media(max-width:600px){.refresh{right:20px;}}
.status-bar{font-size:11px;color:var(--soft);text-align:center;padding:6px;}
</style>
</head>
<body>
<header><div class="head-in">
  <div class="brand">Power <span class="puff">Puffs</span> HQ</div>
  <div class="tagline">🐼 Йоли · 🦌 Ели · 🐺 Алекс</div>
</div></header>
<main class="wrap">
  <section id="v-furniture" class="view on"></section>
  <section id="v-offers" class="view"></section>
  <section id="v-money" class="view"></section>
  <section id="v-calendar" class="view"></section>
  <section id="v-plans" class="view"></section>
</main>
<button class="refresh" id="refresh" title="Презареди">⟳</button>
<nav><div class="nav-in">
  <button class="tab on" data-tab="furniture"><span class="ico">🛋️</span><span class="lbl">Мебели</span></button>
  <button class="tab" data-tab="offers"><span class="ico">💼</span><span class="lbl">Оферти</span></button>
  <button class="tab" data-tab="money"><span class="ico">💰</span><span class="lbl">Пари</span></button>
  <button class="tab" data-tab="calendar"><span class="ico">🗓️</span><span class="lbl">Календар</span></button>
  <button class="tab" data-tab="plans"><span class="ico">🚀</span><span class="lbl">Планове</span></button>
</div></nav>

const EMOJI={"Йоли":"🐼","Ели":"🦌","Алекс":"🐺","Всички":"💕"};
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ---- CSV parser (handles quotes, newlines, commas) ---- */
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"')q=true;
      else if(c===','){row.push(cur);cur="";}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows;
}

/* ---- detect which sheet a CSV is, by its header/content ---- */
function classify(rows){
  const flat=rows.flat().join(" ").toLowerCase();
  // find header row (the one containing known column names)
  if(flat.includes("артикул")) return "furniture";
  if(flat.includes("клиент")&&flat.includes("оферта")) return "offers";
  if(flat.includes("за какво")||flat.includes("баланс")) return "money";
  if(flat.includes("събитие")) return "calendar";
  if(flat.includes("идея")||flat.includes("задача")) return "plans";
  return null;
}
function headerIdx(rows){
  for(let i=0;i<rows.length;i++){
    const j=rows[i].join("").toLowerCase();
    if(/артикул|клиент|за какво|събитие|идея\/задача|идея/.test(j)) return i;
  }
  return 0;
}
function colMap(header){
  const m={};header.forEach((h,i)=>{m[h.trim().toLowerCase()]=i;});
  return m;
}
function pick(map,row,...names){
  for(const n of names){const i=map[n.toLowerCase()];if(i!=null&&row[i]!=null&&row[i]!=="")return row[i];}
  return "";
}
const truthy=v=>/^(true|вярно|1|x|да|✓)$/i.test(String(v).trim());

/* ---- transform each sheet ---- */
function whoFromCols(map,row){
  const out=[];
  for(const p of PEOPLE){
    const key=Object.keys(map).find(k=>k.includes(p.toLowerCase()));
    if(key!=null&&truthy(row[map[key]]))out.push(p);
  }
  return out;
}
function isTotalRow(row){
  const f=(row[0]||"").toLowerCase();
  return f.includes("total")||f.includes("платено от")||f.trim()==="";
}

const DATA={furniture:[],offers:[],money:[],calendar:[],plans:[]};

function buildFurniture(rows){
  const hi=headerIdx(rows);const map=colMap(rows[hi]);const out=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];if(isTotalRow(r))continue;
    const name=pick(map,r,"артикул");if(!name.trim())continue;
    out.push({name,cost:parseFloat(pick(map,r,"cost €","cost","цена")||0)||0,
      who:whoFromCols(map,r),status:pick(map,r,"status","статус"),notes:pick(map,r,"notes","бележки")});
  }
  return out;
}
function buildOffers(rows){
  const hi=headerIdx(rows);const map=colMap(rows[hi]);const out=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];const client=pick(map,r,"клиент");if(!client.trim())continue;
    out.push({client,type:pick(map,r,"вид работа"),qty:pick(map,r,"количество"),
      status:pick(map,r,"status","статус"),src:pick(map,r,"източник"),to:pick(map,r,"към кого"),
      offer:pick(map,r,"оферта (пълен текст)","оферта"),notes:pick(map,r,"notes","бележки")});
  }
  return out;
}
function buildMoney(rows){
  const hi=headerIdx(rows);const map=colMap(rows[hi]);const out=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];if(isTotalRow(r))continue;
    const what=pick(map,r,"за какво");if(!what.trim())continue;
    out.push({date:pick(map,r,"date","дата"),what,amount:parseFloat(pick(map,r,"amount €","amount","сума")||0)||0,
      who:whoFromCols(map,r),cat:pick(map,r,"категория"),notes:pick(map,r,"notes","бележки")});
  }
  return out;
}
function buildCalendar(rows){
  const hi=headerIdx(rows);const map=colMap(rows[hi]);const out=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];const ev=pick(map,r,"събитие");if(!ev.trim())continue;
    out.push({event:ev,date:pick(map,r,"date","дата"),time:pick(map,r,"час"),who:pick(map,r,"кой")});
  }
  return out;
}
function buildPlans(rows){
  const hi=headerIdx(rows);const map=colMap(rows[hi]);const out=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];const idea=pick(map,r,"идея/задача","идея");if(!idea.trim())continue;
    out.push({idea,stage:pick(map,r,"stage","етап"),details:pick(map,r,"детайли"),who:pick(map,r,"кой")});
  }
  return out;
}
const BUILDERS={furniture:buildFurniture,offers:buildOffers,money:buildMoney,calendar:buildCalendar,plans:buildPlans};

/* ---- fetch all sheets from Apps Script (single JSON) ---- */
async function fetchAll(){
  if(!CFG.apiUrl||CFG.apiUrl.indexOf("__API")===0) return -1; // not configured yet
  let json;
  try{
    const r=await fetch(CFG.apiUrl+(CFG.apiUrl.includes("?")?"&":"?")+"t="+Date.now());
    json=await r.json();
  }catch(e){ return 0; }
  let ok=0;
  // json = { "SheetName": [[row],[row],...], ... }  — classify each by content
  Object.values(json).forEach(rows=>{
    if(!Array.isArray(rows)||!rows.length)return;
    const norm=rows.map(r=>r.map(c=>c==null?"":String(c)));
    const kind=classify(norm);
    if(kind&&BUILDERS[kind]){DATA[kind]=BUILDERS[kind](norm);ok++;}
  });
  return ok;
}

/* ---- renderers ---- */
function whoChips(arr){if(!arr||!arr.length)return '<span class="meta">—</span>';return arr.map(w=>`<span class="who">${EMOJI[w]||""} ${esc(w)}</span>`).join(" ");}
function statusPill(s){const map={"Офис":"office","Извън офис":"out","Идея":"idea","Раздадени":"given"};return `<span class="pill ${map[s]||'status'}">${esc(s)}</span>`;}

function renderFurniture(){
  const f=DATA.furniture;if(!f.length)return emptyState();
  const t={Йоли:0,Ели:0,Алекс:0};let g=0;
  f.forEach(it=>{g+=it.cost;it.who.forEach(p=>{if(t[p]!=null)t[p]+=it.cost;});});
  let h=`<div class="sec-title">Мебели и инвентар</div><div class="sec-sub">${f.length} артикула</div>
  <div class="chips">
    <div class="chip"><div class="k">Общо</div><div class="v">${g} €</div></div>
    <div class="chip"><div class="k">🐼 Йоли</div><div class="v">${t.Йоли} €</div></div>
    <div class="chip"><div class="k">🦌 Ели</div><div class="v">${t.Ели} €</div></div>
    <div class="chip"><div class="k">🐺 Алекс</div><div class="v">${t.Алекс} €</div></div>
  </div>`;
  f.forEach(it=>{h+=`<div class="card"><h3>${esc(it.name)}</h3><div class="row">
    ${it.cost>0?`<span class="pill cost">${it.cost} €</span>`:``}${statusPill(it.status)}${whoChips(it.who)}
    </div>${it.notes?`<div class="note">${esc(it.notes)}</div>`:``}</div>`;});
  return h;
}
function renderOffers(){
  const o=DATA.offers;if(!o.length)return emptyState();
  let h=`<div class="sec-title">Оферти и поръчки</div><div class="sec-sub">${o.length} активни</div>`;
  o.forEach(it=>{h+=`<div class="card"><h3>${esc(it.client)}</h3>
    <div class="meta" style="white-space:pre-wrap;margin-bottom:6px">${esc(it.type)}</div>
    <div class="row"><span class="pill status">${esc(it.status)}</span>${it.qty?`<span class="who">${esc(it.qty)}</span>`:``}</div>
    <div class="row"><span class="meta">Източник: ${EMOJI[it.src]||''} ${esc(it.src)}</span>${it.to?`<span class="meta">· Към: ${esc(it.to)}</span>`:``}</div>
    ${it.notes?`<div class="note">📝 ${esc(it.notes)}</div>`:``}
    ${it.offer?`<button class="expand" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'Скрий ▲':'Виж пълната оферта ▼'">Виж пълната оферта ▼</button><div class="offer-text">${esc(it.offer)}</div>`:``}
    </div>`;});
  return h;
}
function renderMoney(){
  const m=DATA.money;if(!m.length)return emptyState();
  const t={Йоли:0,Ели:0,Алекс:0};let bal=0;
  m.forEach(it=>{bal+=it.amount;it.who.forEach(p=>{if(t[p]!=null)t[p]+=it.amount;});});
  let h=`<div class="sec-title">Пари – приходи и разходи</div><div class="sec-sub">приходи +, разходи −</div>
  <div class="chips">
    <div class="chip"><div class="k">Баланс</div><div class="v ${bal<0?'neg':''}">${bal} €</div></div>
    <div class="chip"><div class="k">🐼 Йоли</div><div class="v ${t.Йоли<0?'neg':''}">${t.Йоли} €</div></div>
    <div class="chip"><div class="k">🦌 Ели</div><div class="v ${t.Ели<0?'neg':''}">${t.Ели} €</div></div>
    <div class="chip"><div class="k">🐺 Алекс</div><div class="v ${t.Алекс<0?'neg':''}">${t.Алекс} €</div></div>
  </div>`;
  m.forEach(it=>{const neg=it.amount<0;h+=`<div class="card"><h3>${esc(it.what)}</h3>
    <div class="row"><span class="pill ${neg?'out':'office'}">${it.amount} €</span><span class="pill status">${esc(it.cat)}</span><span class="meta">${esc(it.date)}</span></div>
    <div class="row">${whoChips(it.who)}</div>${it.notes?`<div class="note">${esc(it.notes)}</div>`:``}</div>`;});
  return h;
}
function renderCalendar(){
  const c=[...DATA.calendar].sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  let h=`<div class="sec-title">Календар и срокове</div><div class="sec-sub">времената са GMT+3</div>`;
  if(!c.length)h+=emptyState();
  c.forEach(it=>{
    let d=0,mo="";const mm=String(it.date).match(/(\d{4})-(\d{2})-(\d{2})/);
    if(mm){d=+mm[3];mo=MONTHS[+mm[2]-1];}else{d="•";mo="";}
    h+=`<div class="card cal-item"><div class="cal-date"><div class="d">${d}</div><div class="m">${mo}</div></div>
    <div class="cal-body"><div class="t">${esc(it.event)}</div>
    <div class="row"><span class="who">${EMOJI[it.who]||''} ${esc(it.who)}</span>${it.time?`<span class="meta">⏰ ${esc(it.time)}</span>`:``}</div></div></div>`;
  });
  const g=CFG.gallery,im=CFG.images;
  h+=`<div class="sec-title" style="margin-top:26px">Преди & след 📸</div><div class="gal">`;
  g.beforeAfter.forEach((id,k)=>{h+=`<div class="${k===0?'gal-wide':''}"><img src="${im[id]}" onclick="lb('${id}')"></div>`;});
  h+=`</div><div class="sec-title" style="margin-top:22px">Продукти от колега</div><div class="sec-sub">за продажба</div><div class="gal">`;
  g.products.forEach(id=>{h+=`<div><img src="${im[id]}" onclick="lb('${id}')"></div>`;});
  h+=`</div>`;
  return h;
}
function renderPlans(){
  const p=DATA.plans;if(!p.length)return emptyState();
  let h=`<div class="sec-title">Планове и идеи</div><div class="sec-sub">Idea → Next → Doing</div>`;
  p.forEach(it=>{h+=`<div class="card"><h3>${esc(it.idea)}</h3>
    <div class="row"><span class="pill idea">${esc(it.stage)}</span><span class="who">${EMOJI[it.who]||'💕'} ${esc(it.who)}</span></div>
    ${it.details?`<div class="note">${esc(it.details)}</div>`:``}</div>`;});
  return h;
}
function emptyState(){return `<div class="empty">Няма данни в този лист.<br>Провери дали е публикуван като CSV.</div>`;}

const RENDER={furniture:renderFurniture,offers:renderOffers,money:renderMoney,calendar:renderCalendar,plans:renderPlans};
let CUR="furniture";
function paint(){document.getElementById("v-"+CUR).innerHTML=RENDER[CUR]();}
function paintAll(){Object.keys(RENDER).forEach(k=>{document.getElementById("v-"+k).innerHTML=RENDER[k]();});}

function lb(id){document.getElementById('lbimg').src=CFG.images[id];document.getElementById('lb').classList.add('on');}
document.getElementById('lb').onclick=()=>document.getElementById('lb').classList.remove('on');

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');CUR=t.dataset.tab;
  document.getElementById('v-'+CUR).classList.add('on');window.scrollTo(0,0);
});

async function refresh(){
  document.getElementById("v-"+CUR).innerHTML=`<div class="loader"><div class="spin"></div>Зареждам от таблицата…</div>`;
  const ok=await fetchAll();
  paintAll();
  if(ok===-1){
    document.getElementById("v-"+CUR).innerHTML=`<div class="empty">Линкът към Apps Script още не е поставен.<br>Отвори файла и замести <code>__API_URL__</code> с твоя Web app URL (завършва на /exec).</div>`;
  }else if(!ok){
    document.getElementById("v-"+CUR).innerHTML=`<div class="empty">Не успях да заредя.<br>Провери дали скриптът е Deploy-нат с достъп „Anyone".</div>`;
  }
}
document.getElementById('refresh').onclick=refresh;
refresh();
</script>
